services:
  api:
    build:
      context: ./backend
    container_name: hrms-api
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: sqlite+aiosqlite:///./storage/hrms.db
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    container_name: hrms-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_DISABLE_DEVTOOLS: "1"
    command: sh -c "rm -rf .next && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
